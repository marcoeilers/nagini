# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Nagini Functional Tests Windows Python 3.14

on: [push, pull_request, workflow_dispatch]

jobs:
  build:

    runs-on: windows-2025
    env:
      BOOGIE_EXE: "C:\\Users\\runneradmin\\.dotnet\\tools\\boogie"
    steps:
    - uses: actions/checkout@v5
    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: "21"
        distribution: temurin
    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"
    - name: Setup .NET
      uses: xt0rted/setup-dotnet@v1.5.0
      with:
        dotnet-version: 6.0.x
    - name: Install Boogie
      run: |
        dotnet tool install --global Boogie --version 2.15.9
    - name: Install Nagini
      run: |
        python -m pip install --upgrade pip
        pip install ".[test]"
    - name: Test with pytest
      run: |
        pytest -v -p no:faulthandler src/nagini_translation/tests.py --silicon --carbon --functional
